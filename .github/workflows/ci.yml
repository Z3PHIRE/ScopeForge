name: CI

on:
  push:
  pull_request:

jobs:
  pwsh:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse scripts
        shell: pwsh
        run: |
          $null = [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path .\Launch-ScopeForge.ps1), [ref]$null, [ref]$null)
          $null = [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path .\Launch-ScopeForgeFromGitHub.ps1), [ref]$null, [ref]$null)
          $null = [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path .\ScopeForge.ps1), [ref]$null, [ref]$null)

      - name: Run Pester
        shell: pwsh
        run: |
          $requiredPesterVersion = [version]'3.4.0'
          $installedPester = Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -eq $requiredPesterVersion } | Select-Object -First 1
          if (-not $installedPester) {
            Install-Module Pester -Name Pester -RequiredVersion $requiredPesterVersion -Scope CurrentUser -Force -SkipPublisherCheck -AllowClobber
          }
          Import-Module Pester -RequiredVersion $requiredPesterVersion -Force
          $invokePester = Get-Command Invoke-Pester
          $pesterParams = @{ PassThru = $true }
          if ($invokePester.Parameters.ContainsKey('Path')) {
            $pesterParams.Path = '.\tests'
          } else {
            $pesterParams.Script = '.\tests'
          }
          $result = Invoke-Pester @pesterParams
          $failedCount = if ($null -ne $result.FailedCount) { [int]$result.FailedCount } else { 0 }
          if ($failedCount -gt 0) {
            throw "Pester failures: $failedCount"
          }

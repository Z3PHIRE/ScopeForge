name: CI

on:
  push:
  pull_request:

jobs:
  pwsh:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Parse scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $files = @(
            '.\Launch-ScopeForge.ps1',
            '.\Launch-ScopeForgeFromGitHub.ps1',
            '.\ScopeForge.ps1'
          )

          foreach ($file in $files) {
            $tokens = $null
            $errors = $null

            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $file),
              [ref]$tokens,
              [ref]$errors
            )

            if ($errors -and $errors.Count -gt 0) {
              foreach ($err in $errors) {
                Write-Host "::error file=$file,line=$($err.Extent.StartLineNumber),col=$($err.Extent.StartColumnNumber)::$($err.Message)"
              }
              throw "Parser errors found in $file"
            }
          }

      - name: Run Pester
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # Install Pester 5.x for modern syntax support
          $installedPester = Get-Module -ListAvailable -Name Pester |
            Sort-Object Version -Descending |
            Select-Object -First 1

          if (-not $installedPester -or $installedPester.Version.Major -lt 5) {
            Install-Module -Name Pester -MinimumVersion 5.0 -Scope CurrentUser -Force -SkipPublisherCheck -AllowClobber
          }

          Import-Module Pester -MinimumVersion 5.0 -Force

          $config = New-PesterConfiguration
          $config.Run.Path = '.\tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'

          Invoke-Pester -Configuration $config
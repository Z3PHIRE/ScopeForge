name: CI

on:
  push:
  pull_request:

jobs:
  parse:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Parse scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $files = @(
            '.\Launch-ScopeForge.ps1',
            '.\Launch-ScopeForgeFromGitHub.ps1',
            '.\ScopeForge.ps1'
          )

          foreach ($file in $files) {
            $tokens = $null
            $errors = $null

            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $file),
              [ref]$tokens,
              [ref]$errors
            )

            if ($errors -and $errors.Count -gt 0) {
              foreach ($err in $errors) {
                Write-Host "::error file=$file,line=$($err.Extent.StartLineNumber),col=$($err.Extent.StartColumnNumber)::$($err.Message)"
              }
              throw "Parser errors found in $file"
            }
          }

  pester:
    needs: parse
    runs-on: windows-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bootstrap
            file: .\tests\Bootstrap.Tests.ps1
          - name: launcher
            file: .\tests\Launcher.Tests.ps1
          - name: reports
            file: .\tests\Reports.Tests.ps1
          - name: rerun
            file: .\tests\Rerun.Tests.ps1
          - name: runtime
            file: .\tests\Runtime.Tests.ps1
          - name: toolbootstrap
            file: .\tests\ToolBootstrap.Tests.ps1
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Run Pester
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $WarningPreference = 'SilentlyContinue'

          # Install Pester 5.x for modern syntax support
          $installedPester = Get-Module -ListAvailable -Name Pester |
            Sort-Object Version -Descending |
            Select-Object -First 1

          if (-not $installedPester -or $installedPester.Version.Major -lt 5) {
            Install-Module -Name Pester -MinimumVersion 5.0 -Scope CurrentUser -Force -SkipPublisherCheck -AllowClobber
          }

          Import-Module Pester -MinimumVersion 5.0 -Force

          $config = New-PesterConfiguration
          $config.Run.Path = '${{ matrix.file }}'
          $config.Run.PassThru = $true
          $config.Output.Verbosity = 'Normal'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = '.\artifacts\pester\${{ matrix.name }}.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'

          if (-not (Test-Path -LiteralPath '.\artifacts\pester')) {
            $null = New-Item -ItemType Directory -Path '.\artifacts\pester' -Force
          }

          $result = Invoke-Pester -Configuration $config

          if ($result.FailedCount -gt 0) {
            Write-Host ''
            Write-Host 'Pester failures:' -ForegroundColor Red
            foreach ($failed in @($result.Failed)) {
              Write-Host ("- {0}" -f $failed.ExpandedPath) -ForegroundColor Red
              if ($failed.ErrorRecord) {
                Write-Host ("  {0}" -f $failed.ErrorRecord) -ForegroundColor DarkRed
              } elseif ($failed.FailureMessage) {
                Write-Host ("  {0}" -f $failed.FailureMessage) -ForegroundColor DarkRed
              }
            }
            throw "Pester reported $($result.FailedCount) failing test(s)."
          }

      - name: Upload Pester results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results-${{ matrix.name }}
          path: .\artifacts\pester\${{ matrix.name }}.xml
          if-no-files-found: ignore
